services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: drivermap
      POSTGRES_PASSWORD: drivermap
      POSTGRES_DB: drivermap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivermap -d drivermap"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://drivermap:drivermap@db:5432/drivermap
      DATABASE_URL_SYNC: postgresql://drivermap:drivermap@db:5432/drivermap
      JWT_SECRET: dev-secret-change-in-production
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
